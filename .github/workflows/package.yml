name: Package check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Validate manifest (vsce ls)
        run: vsce ls

      - name: Package extension
        run: vsce package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: microbit-themes-vsix
          path: '*.vsix'
          if-no-files-found: error
